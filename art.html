<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chloe's Scavenger Hunt!</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="next-step" content="coffee"/>
    <meta name="answer" content="coffee"/>
    <script src="answer-form.js" defer></script>
    <script src="hints.js" defer></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Scavenger Hunt!</h1>
    </header>
    <main>
        <div class="box question">
            <h2>Part 7</h2>
            <form id="question">
                <p>The duck is not a patron of the arts, and has punished your Detour by abandoning you! Where could he have gone, it's too late for coffee, right?</p>
                <label for="answer">Passcode:</label>
                <input type="text" name="answer" id="answer" required>
                <button type="submit">Answer</button>
            </form>
        </div>
        <div class="box hint">
            <div class="hintbox">
                <button id="reveal-hint">🔎 Reveal Hint</button>
                <p id="hint-content" hidden>I think I heard him mumbling something about needing a Habibi Latte before he abandoned you.</p>
            </div>
            <dialog id="confirm-modal">
                <div class="modal-content">
                    <h2>Are you sure?</h2>
                    <p id="confirm-desc">X</p>
                    <div class="modal-actions">
                        <button id="cancel">Nevermind</button>
                        <button id="confirm" class="btn-danger">Gimme the hint!</button>
                    </div>
                </div>
            </dialog>
        </div>
    </main>
</body>
</html>
