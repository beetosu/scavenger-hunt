<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chloe's Scavenger Hunt!</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="next-step" content="gay"/>
    <meta name="answer" content="3"/>
    <script src="answer-form.js" defer></script>
    <script src="hints.js" defer></script>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
</head>
<body>
    <header>
        <h1>Scavenger Hunt!</h1>
    </header>
    <main>
        <div class="box question">
            <h2>Part 3: The Slurpee</h2>
            <div class="illustration">
                <img src="/images/step3.gif" alt="a bunny holding a lesbian pride flag" />
            </div>
            <form id="question">
                <p>Turn the corner past the gym, walk down that street, and you may find a monument to the L and G of the BT!</p>
                <label for="answer">How many bunnies are on the sapphic side?</label>
                <input type="text" name="answer" id="answer" required>
                <button type="submit">Answer</button>
            </form>
        </div>
        <div class="box hint">
            <div class="hintbox">
                <button id="reveal-hint">🔎 Reveal Hint</button>
                <p id="hint-content" hidden>Walking north along Stuart should get you to the fuse box you ought to birdwatch on.</p>
            </div>
            <dialog id="confirm-modal">
                <div class="modal-content">
                    <h2>Are you sure?</h2>
                    <p id="confirm-desc">X</p>
                    <div class="modal-actions">
                        <button id="cancel">Nevermind</button>
                        <button id="confirm" class="btn-danger">Gimme the hint!</button>
                    </div>
                </div>
            </dialog>
        </div>
    </main>
</body>
</html>
